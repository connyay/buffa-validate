syntax = "proto3";

package test.v1;

import "buf/validate/validate.proto";

message User {
  string name = 1 [(buf.validate.field).string.min_len = 1];
  string email = 2 [(buf.validate.field).string.email = true];
  uint32 age = 3 [(buf.validate.field).uint32 = {
    gte: 0,
    lte: 150
  }];
  optional string nickname = 4 [(buf.validate.field).string.max_len = 32];
}

message SimpleRequired {
  optional string value = 1 [(buf.validate.field) = {
    required: true,
    string: { min_len: 1 }
  }];
}
